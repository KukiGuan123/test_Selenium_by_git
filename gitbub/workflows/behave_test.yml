# .github/workflows/behave_test.yml
name: UI 自动化测试流水线

# 触发条件：
# 1. 推送到 main 分支时自动跑
# 2. 支持手动点击运行
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🏊 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          # 安装项目依赖
          pip install -r requirements.txt

      - name: 🌐 安装 Playwright 浏览器依赖
        run: |
          # 安装 Chromium 浏览器
          playwright install chromium
          # 安装 Ubuntu 系统依赖（必须，否则浏览器启动失败）
          playwright install-deps chromium

      - name: 🚀 执行 Behave 测试
        run: |
          # 直接运行 behave，自动读取根目录的 behave.ini
          behave
        continue-on-error: true # 测试失败也能上传报告，不终止流程

      - name: 📤 上传测试报告与日志
        uses: actions/upload-artifact@v4
        with:
          name: 测试报告产物
          # 上传你的报告和日志文件夹
          path: |
            reports/
            logs/
          retention-days: 15 # 报告保留15天